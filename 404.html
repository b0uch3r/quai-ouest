<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — Quai Ouest</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚓</text></svg>">
  <link rel="icon" sizes="any" type="image/svg+xml" href="favicon.svg?v=20260322">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #F7F5F0;
      color: #4A4A4A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    .anchor { font-size: 4rem; margin-bottom: 1rem; }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2rem;
      color: #2C5F7C;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      color: #4A4A4A;
    }
    .btn {
      display: inline-block;
      background: #C4723A;
      color: #fff;
      padding: 0.85rem 2rem;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.3s, transform 0.3s;
    }
    .btn:hover { background: #D4A853; transform: translateY(-2px); }
    .phone {
      display: block;
      margin-top: 1.5rem;
      color: #2C5F7C;
      font-weight: 500;
      text-decoration: none;
    }
    .phone:hover { color: #C4723A; }
  </style>
</head>
<body>
  <div class="container">
    <div class="anchor">⚓</div>
    <h1>Page introuvable</h1>
    <p>La page que vous cherchez n'existe pas ou a été déplacée. Revenez sur notre site pour découvrir notre carte et réserver votre table.</p>
    <a href="/quai-ouest/" class="btn">Retour à l'accueil</a>
    <a href="tel:0298290809" class="phone">02 98 29 08 09</a>
  </div>
</body>
</html>
